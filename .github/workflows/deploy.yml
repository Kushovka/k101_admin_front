name: Deploy Admin Front

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and restart container
        run: |
          PROJECT_DIR="/home/kirill/projects/k101_admin_front"

          echo "===================================="
          echo "Deploying Admin Front..."
          echo "===================================="

          cd $PROJECT_DIR || { echo "Directory not found"; exit 1; }

          echo "[INFO] Pull latest changes..."
          git pull origin master || { echo "Git pull failed"; exit 1; }

          echo "[INFO] Building docker image..."
          docker build -t k101_admin_front_react . || { echo "Docker build failed"; exit 1; }

          echo "[INFO] Stopping old container..."
          docker rm -f k101_admin_front_react || true

          echo "[INFO] Starting new container..."
          docker run -d \
            -p 4301:80 \
            --name k101_admin_front_react \
            --restart always \
            k101_admin_front_react || { echo "Docker run failed"; exit 1; }

          echo "[INFO] Cleaning unused images..."
          docker image prune -f

          echo "===================================="
          echo "✅ Frontend deployed successfully"
          echo "===================================="
